name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # Cloudflare Worker URL — set this in repo Settings → Secrets → Actions
          VITE_OPENSKY_PROXY_URL: ${{ secrets.VITE_OPENSKY_PROXY_URL }}
          # OAuth2 credentials — also set as secrets
          VITE_OPENSKY_CLIENT_ID: ${{ secrets.VITE_OPENSKY_CLIENT_ID }}
          VITE_OPENSKY_CLIENT_SECRET: ${{ secrets.VITE_OPENSKY_CLIENT_SECRET }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
